model:
  class: TransformerModel
  module_path: qlib.contrib.model.pytorch_transformer
  kwargs:
    d_feat: 15 # 15 best
    d_model: 8
    num_layers: 2 # 1 or 2
    nhead: 2
    dropout: 0.2
    batch_size: 32 # 32 best
    n_epochs: 200
    step_len: 20
    lr: 0.0001 # 0.0001 best
    early_stop: 30
    loss: mse
    optimizer: adam
    GPU: -1

dataset:
  class: DatasetH
  module_path: qlib.data.dataset
  kwargs:
    handler: {}
    segments:
      train: ["2010-01-01","2019-12-31" ]
      valid: ["2020-01-01","2021-12-31"]
      test: ["2022-01-01","2025-12-31"]