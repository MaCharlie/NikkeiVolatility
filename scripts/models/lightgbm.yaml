model:
  class: "LGBModel"
  module_path: "qlib.contrib.model.gbdt"
  kwargs:
    loss: "mse"
    colsample_bytree: 0.8
    subsample: 0.8
    learning_rate: 0.05

    lambda_l1: 0.2
    lambda_l2: 5.0
    max_depth: 5
    min_data_in_leaf: 100
    num_leaves: 31
    num_threads: 5

    early_stopping_rounds: 50

dataset_segments:
  train: ["2010-01-01","2019-12-31" ]
  valid: ["2020-01-01","2021-12-31"]
  test: ["2022-01-01","2025-12-31"]
